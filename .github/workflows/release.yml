name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        run: |
          echo "Publishing to NPM..."
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  announce-patreon:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Post to Patreon
        run: |
          curl -X POST "https://www.patreon.com/api/oauth2/v2/posts" \
            -H "Authorization: Bearer ${{ secrets.PATREON_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- << 'EOF'
              {
                "data": {
                  "type": "post",
                  "attributes": {
                    "title": "📦 Write CLI v${{ steps.version.outputs.version }} Released!",
                    "content": "A new version of the Write CLI tool has been released! 🎉\n\n**Version:** ${{ steps.version.outputs.version }}\n**Release Notes:** ${{ github.event.release.html_url }}\n**NPM Package:** https://www.npmjs.com/package/@demccormack/write\n\nInstall with: `npm install -g @demccormack/write`\n\nThank you for your support! ❤️",
                    "is_paid": false,
                    "post_type": "text_only"
                  }
                }
              }
            EOF
